name: production

on:
  push:
    tags:
    - v*

permissions:
  contents: read
  packages: write

jobs:
  lint:
    uses: potber/.github/.github/workflows/npm_lint.yml@v2

  test:
    uses: potber/.github/.github/workflows/npm_test-playwright.yml@v2

  release_image:
    needs:
    - lint
    - test
    permissions:
      contents: read
      packages: write
    uses: potber/.github/.github/workflows/release_image.yml@v2
    with:
      latest: true
